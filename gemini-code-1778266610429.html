<!DOCTYPE html>
<html lang="kaa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keleshek Portalı | AI-Mentor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-bg: #fdfeff; --accent: #3b82f6; --warm-green: #10b981; }
        body { font-family: 'Inter', sans-serif; background-color: var(--main-bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 15px; text-align: center; border-bottom: 1px solid #eee; background: white; }
        .header h1 { font-size: 18px; margin: 0; color: var(--accent); }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .ai { background: #eef2ff; align-self: flex-start; color: #1e293b; border-bottom-left-radius: 2px; }
        .user { background: var(--accent); align-self: flex-end; color: white; border-bottom-right-radius: 2px; }
        .input-area { padding: 15px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        .send-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; }
        .private-btn { background: var(--warm-green); color: white; border: none; padding: 10px; width: 100%; font-weight: bold; border-radius: 0; }
    </style>
</head>
<body>

<div class="header">
    <h1>✨ Keleshek Portalı</h1>
    <small>Ameliyatshi psixologı: Muratbek Kutlimuratov</small>
</div>

<div class="chat-container" id="chat">
    <div class="bubble ai">Assalawma áleykum! Men AI-Mentorpan. Seniń keleshegińe jol kórsetiwge tayarman. Barlıq aytqanlarıń sır saqlanadı. Birinshi bolıp, atıńdı hám jasıńdı ayta alasań ba? 😊</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Juwabıńızdı jazıń...">
    <button class="send-btn" onclick="sendMessage()">Jiberiw</button>
</div>

<button class="private-btn" onclick="contactPsychologist()">✉️ Psixologqa jeke xat (Sır saqlanadı)</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function sendMessage() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat');
        if (input.value.trim() === "") return;

        // Oqıwshı xabarın qosıw
        const userDiv = document.createElement('div');
        userDiv.className = 'bubble user';
        userDiv.innerText = input.value;
        chat.appendChild(userDiv);

        // Bul jerde AI-ǵa xabar ketedi (API arqalı)
        // Házirshe test rejiminde:
        setTimeout(() => {
            const aiDiv = document.createElement('div');
            aiDiv.className = 'bubble ai';
            aiDiv.innerText = "A’la! Seni túsindim. Endi keleshek haqqında oylanayıq...   Ne rejelerin'iz bar?";
            chat.appendChild(aiDiv);
            chat.scrollTop = chat.scrollHeight;
        }, 1000);

        input.value = "";
        chat.scrollTop = chat.scrollHeight;
    }

    function contactPsychologist() {
        tg.sendData("JEKE_XAT_REJIMI"); // Botqa jeke xat kerek ekenin bildiredi
        alert("Siz jeke xat rejimine óttińiz. Jazǵan xatlarıńız tek Muratbek aǵaǵa kórinedi.");
    }
</script>

</body>
</html>
