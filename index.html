<!DOCTYPE html>
<html lang="kaa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keleshek Portalı | AI-Mentor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #2196f3;
            --bg-color: #f0f2f5;
            --ai-msg-bg: #ffffff;
            --user-msg-bg: #0084ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Chat maydanı */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .ai {
            background-color: var(--ai-msg-bg);
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .user {
            background-color: var(--user-msg-bg);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* Kirgiziw bólimi */
        .input-area {
            background: white;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #ddd;
            padding-bottom: env(safe-area-inset-bottom); /* iPhone ushın */
        }

        input {
            flex: 1;
            border: 1px solid #ddd;
            padding: 12px 15px;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.9);
        }

        /* Júkleniw animatsiyası */
        .typing {
            font-style: italic;
            font-size: 12px;
            color: #777;
            margin-left: 5px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="message ai">
            Assalawma áleykum! Men — Muratbek Kutlimuratov tárepinen jaratılǵan AI-Mentorpan. Keleshegińiz haqqında birge sóylesemiz be? Atıńızdı jazıń.
        </div>
    </div>

    <div id="typing-indicator" class="typing" style="padding-left: 20px; padding-bottom: 5px;">AI juvap jazbaqta...</div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Xabar jazıń..." autocomplete="off">
        <button onclick="sendMessage()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Ekrandı tolıq ashıw

        // Render-degi server mánzilińiz
        const RENDER_URL = 'https://quake-rancidity-washbasin.ngrok-free.dev';
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typing-indicator');

        // Enter basqanda jiberiw
        userInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Paydalanıshı xabarın kórsetiw
            appendMessage(text, 'user');
            userInput.value = '';
            
            // Júkleniw kórsetkishin qosıw
            typingIndicator.style.display = 'block';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch(`${RENDER_URL}/ask`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user_id: String(tg.initDataUnsafe.user?.id || 'web_user'),
                        text: text
                    })
                });

                if (!response.ok) throw new Error('Server qáteligi');

                const data = await response.json();
                appendMessage(data.reply, 'ai');

            } catch (error) {
                console.error(error);
                appendMessage("Keshiresiz, baylanısta qátelik boldı. Render serverińiz qosıǵanlıǵın tekseriń.", 'ai');
            } finally {
                typingIndicator.style.display = 'none';
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
